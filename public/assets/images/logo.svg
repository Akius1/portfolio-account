<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e1b"/>
      <stop offset="100%" stop-color="#0d0d0b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="111" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>

  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="512" height="18" rx="9" fill="url(#accentGrad)" opacity="0.95"/>
  <rect x="0" y="0" width="512" height="112" rx="112" fill="url(#accentGrad)" opacity="0.04"/>

  <!-- Glow accent dots -->
  <circle cx="130" cy="390" r="80" fill="#6366f1" opacity="0.04" filter="url(#glow)"/>
  <circle cx="390" cy="130" r="60" fill="#06b6d4" opacity="0.04" filter="url(#glow)"/>

  <!-- ═══ LETTER A ═══ -->
  <!-- Left stroke of A -->
  <polygon points="64,400 112,400 196,148 148,148" fill="white"/>
  <!-- Right stroke of A -->
  <polygon points="196,148 244,148 328,400 280,400" fill="white"/>
  <!-- Crossbar of A -->
  <rect x="122" y="302" width="152" height="36" rx="18" fill="white"/>

  <!-- ═══ LETTER U ═══ -->
  <!-- Left vertical stroke -->
  <rect x="312" y="148" width="48" height="188" rx="24" fill="white"/>
  <!-- Right vertical stroke -->
  <rect x="456" y="148" width="48" height="188" rx="24" fill="white"/>
  <!-- Bottom horizontal connector (the curve of U) -->
  <rect x="312" y="288" width="192" height="48" rx="24" fill="white"/>

  <!-- Accent dot — bottom right corner mark -->
  <circle cx="468" cy="390" r="18" fill="url(#accentGrad)" opacity="0.9"/>

</svg>
